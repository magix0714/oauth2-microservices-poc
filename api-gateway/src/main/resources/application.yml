server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${GATEWAY_JWT_JWK_SET_URI:http://localhost:8081/realms/demo-realm/protocol/openid-connect/certs}
  cloud:
    gateway:
      # Routes are defined in GatewayRoutesConfig for explicit and portable registration.
      routes: []

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
